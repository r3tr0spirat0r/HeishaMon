[platformio]
src_dir = ./HeishaMon/

[env:esp32]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed = 460800
build_flags = 
    -DCORE_DEBUG_LEVEL=0
lib_deps = 
    ringbuffer
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    milesburton/DallasTemperature
    paulstoffregen/OneWire
    adafruit/Adafruit NeoPixel
    miq19/eModbus